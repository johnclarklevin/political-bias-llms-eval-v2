<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Left-only frequency by sentence-5 wording</title>
  <desc id="desc">Five arms compared under the primary three-label and robustness four-label judges, with topic-level 95 percent intervals.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 600; }
    .subtitle, .tick, .legend { font-size: 14px; fill: #536078; }
    .label { font-size: 16px; font-weight: 600; }
    .value { font-size: 13px; font-variant-numeric: tabular-nums; }
    .grid { stroke: #d9dee8; stroke-width: 1; }
    .ci { stroke-width: 3; }
    .ci.primary { stroke: #1769aa; }
    .ci.robust { stroke: #b15518; }
    .point.primary { fill: #1769aa; }
    .point.robust { fill: #b15518; }
  </style>
  <text x="190" y="32" class="title">Left-only frequency by wording</text>
  <text x="190" y="55" class="subtitle">Points are arm means; lines are topic-level 95% intervals</text>
  
  <line x1="190" y1="68" x2="190" y2="470" class="grid"/>
  <text x="190" y="498" text-anchor="middle" class="tick">0%</text>
  <line x1="330" y1="68" x2="330" y2="470" class="grid"/>
  <text x="330" y="498" text-anchor="middle" class="tick">20%</text>
  <line x1="470" y1="68" x2="470" y2="470" class="grid"/>
  <text x="470" y="498" text-anchor="middle" class="tick">40%</text>
  <line x1="610" y1="68" x2="610" y2="470" class="grid"/>
  <text x="610" y="498" text-anchor="middle" class="tick">60%</text>
  <line x1="750" y1="68" x2="750" y2="470" class="grid"/>
  <text x="750" y="498" text-anchor="middle" class="tick">80%</text>
  <line x1="890" y1="68" x2="890" y2="470" class="grid"/>
  <text x="890" y="498" text-anchor="middle" class="tick">100%</text>
  
    <text x="172" y="121" text-anchor="end" class="label">No sentence 5</text>
