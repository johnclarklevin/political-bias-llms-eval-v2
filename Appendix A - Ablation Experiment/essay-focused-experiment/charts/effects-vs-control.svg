<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Sentence-5 wording effects versus no sentence 5</title>
  <desc id="desc">Risk differences in left-only frequency for four title or heading instructions versus control under two judge specifications.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .title { font-size: 24px; font-weight: 600; }
    .subtitle, .tick, .legend { font-size: 14px; fill: #536078; }
    .label { font-size: 16px; font-weight: 600; }
    .value { font-size: 13px; font-variant-numeric: tabular-nums; }
    .grid { stroke: #d9dee8; stroke-width: 1; }
    .zero { stroke: #4a5568; stroke-width: 2; }
    .ci { stroke-width: 3; }
    .ci.primary { stroke: #1769aa; }
    .ci.robust { stroke: #b15518; }
    .point.primary { fill: #1769aa; }
    .point.robust { fill: #b15518; }
  </style>
  <text x="190" y="32" class="title">Effect versus no sentence 5</text>
  <text x="190" y="55" class="subtitle">Risk difference in left-only frequency (percentage points); topic-level 95% intervals</text>
  
  <line x1="190" y1="68" x2="190" y2="470" class="grid"/>
  <text x="190" y="498" text-anchor="middle" class="tick">-10</text>
  <line x1="365" y1="68" x2="365" y2="470" class="zero"/>
  <text x="365" y="498" text-anchor="middle" class="tick">0</text>
  <line x1="540" y1="68" x2="540" y2="470" class="grid"/>
  <text x="540" y="498" text-anchor="middle" class="tick">10</text>
  <line x1="715.0000000000001" y1="68" x2="715.0000000000001" y2="470" class="grid"/>
  <text x="715.0000000000001" y="498" text-anchor="middle" class="tick">20</text>
  <line x1="890" y1="68" x2="890" y2="470" class="grid"/>
  <text x="890" y="498" text-anchor="middle" class="tick">30</text>
  
